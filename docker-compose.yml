services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: advisor_signal_extraction
      POSTGRES_USER: advisor
      POSTGRES_PASSWORD: advisor
    ports:
      - "2040:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7
    ports:
      - "2050:6379"

  backend:
    build:
      context: .
      dockerfile: infra/backend.Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://advisor:advisor@postgres:5432/advisor_signal_extraction
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    ports:
      - "2030:2030"
    volumes:
      - ./backend:/app/backend
      - ./shared:/app/shared

  worker:
    build:
      context: .
      dockerfile: infra/backend.Dockerfile
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://advisor:advisor@postgres:5432/advisor_signal_extraction
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app/backend
      - ./shared:/app/shared

  frontend:
    build:
      context: .
      dockerfile: infra/frontend.Dockerfile
    depends_on:
      - backend
    environment:
      VITE_API_BASE: http://localhost:2030
    ports:
      - "2020:2020"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules

volumes:
  postgres_data:
